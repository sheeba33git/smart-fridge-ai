{% extends "layout.html" %}
{% block content %}
<h2 style="text-align:center;">📜 History</h2>

<table border="1" style="width:80%;margin:auto;text-align:center;">
<tr>
<th>Image</th><th>Veg</th><th>Status</th><th>Qty</th><th>Date</th>
</tr>

{% for item in data %}
<tr>
<td><img src="{{ url_for('uploaded_file', filename=item[5]) }}" width="60"></td>
<td>{{ item[1] }}</td>
<td>{{ item[2] }}</td>
<td>{{ item[6] }} kg</td>
<td>{{ item[4] }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
